<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void's Arcana</title>
    <style>
        /* --- 1. FONTS --- */
        /* Importing Cinzel (Title) and Courgette (Subtitle) */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Courgette&family=Lato:wght@300;400&display=swap');

        :root {
            --void-purple: #2a0a3a;
            --arcane-glow: #b8aaff; /* Light purple glow */
            --rune-cyan: #aeeeff;
            --subtitle-glow: #00d0ff; /* Cyan glow for subtitle */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background-color: #05010a;
            font-family: 'Cinzel', serif;
            height: 100vh;
            color: white;
        }

        /* --- 2. BACKGROUND LAYERS --- */
        .bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -5;
            overflow: hidden;
        }

        .bg-image {
            width: 100%; height: 100%;
            background: url('Images/cover.png') no-repeat center center;
            background-size: cover;
            /* The slow breathing zoom animation */
            animation: breathe-bg 20s infinite alternate ease-in-out;
        }

        /* Central pulsating light behind the art */
        .void-heartbeat {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(174, 238, 255, 0.2) 0%, transparent 70%);
            z-index: -4;
            pointer-events: none;
            mix-blend-mode: screen;
            animation: heartbeat 4s infinite ease-in-out;
        }

        /* Storm Flash Layer */
        .storm-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--arcane-glow);
            opacity: 0; 
            z-index: -3;
            pointer-events: none;
            mix-blend-mode: color-dodge; 
            transition: opacity 0.1s ease-out;
        }

        .cinematic-shades {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, #000000 100%);
            z-index: -2; pointer-events: none;
        }

        #particle-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* --- 3. UI LAYOUT --- */
        .ui-layer {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 2rem;
        }

        /* --- 4. TYPOGRAPHY (UPDATED) --- */
        header {
            text-align: center; margin-top: 2rem;
            animation: fadeDown 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0; transform: translateY(-30px);
        }

        h1.title {
            /* Exact match for the Title Font Style */
            font-family: 'Cinzel', serif; 
            font-weight: 700; /* Bold */
            font-size: 4rem;
            letter-spacing: 0.05em;
            color: #fff;
            text-transform: uppercase;
            /* Purple Outer Glow */
            text-shadow: 
                0 0 10px var(--arcane-glow),
                0 0 20px var(--void-purple),
                0 0 40px var(--void-purple);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            /* Exact match for the Subtitle Font Style */
            font-family: 'Courgette', cursive;
            font-size: 1.5rem;
            color: white;
            /* Removed uppercase to match image */
            letter-spacing: 0.05em; 
            /* Cyan Glow/Outline Effect */
            text-shadow: 
                0 0 5px var(--subtitle-glow),
                0 0 10px var(--subtitle-glow),
                2px 2px 2px rgba(0,0,0,0.8);
            opacity: 1;
        }

        /* --- 5. BUTTONS --- */
        .controls-area {
            margin-bottom: 3rem; width: 100%; display: flex; justify-content: center;
            animation: fadeUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.3s; opacity: 0; transform: translateY(30px);
        }

        .btn-group {
            display: flex; justify-content: center; align-items: center; gap: 3rem;
            background: rgba(0, 0, 0, 0.6); padding: 1rem 3rem;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .btn {
            font-family: 'Cinzel', serif; font-weight: 600; font-size: 0.9rem;
            letter-spacing: 0.15em; text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7); background: transparent;
            border: none; cursor: pointer; transition: all 0.3s ease;
            position: relative; text-decoration: none; padding: 10px 20px;
        }

        .btn:not(.btn-primary):hover { color: white; text-shadow: 0 0 8px var(--rune-cyan); transform: translateY(-2px); }
        
        .btn-primary {
            color: white; font-weight: 900; font-size: 1.1rem;
            border: 1px solid var(--arcane-glow); background: rgba(42, 10, 58, 0.6);
            padding: 12px 40px; box-shadow: 0 0 15px rgba(160, 32, 240, 0.3); border-radius: 2px;
        }

        .btn-primary:hover {
            background: var(--void-purple); box-shadow: 0 0 25px var(--arcane-glow), inset 0 0 20px var(--void-purple);
            transform: scale(1.05); border-color: white;
        }

        /* --- ANIMATIONS --- */
        @keyframes breathe-bg { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
        @keyframes heartbeat {
            0% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.8); }
        }

        @media (max-width: 768px) {
            h1.title { font-size: 2.5rem; }
            p.subtitle { font-size: 1.2rem; }
            .btn-group { flex-direction: column; gap: 1rem; padding: 1.5rem; background: rgba(0,0,0,0.7); border-radius: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-image"></div>
    </div>
    
    <div class="void-heartbeat"></div>
    <div class="storm-flash" id="storm-overlay"></div>

    <div class="cinematic-shades"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="ui-layer">
        <header>
            <h1 class="title">THE VOID'S ARCANA</h1>
            <p class="subtitle">A Tale from Ashen Hearth</p>
        </header>
        <footer class="controls-area">
            <div class="btn-group">
                <button class="btn" onclick="console.log('Login')">Login</button>
                <button class="btn btn-primary" onclick="console.log('Enter Void')">Enter The Void</button>
                <button class="btn" onclick="console.log('Register')">Register</button>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        let centerX, centerY;

        function setDimensions() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
        }
        setDimensions();
        window.addEventListener('resize', () => { setDimensions(); init(); });

        class WarpStreak {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                let dx = this.x - centerX;
                let dy = this.y - centerY;
                if (Math.sqrt(dx*dx + dy*dy) < 100) this.x = 0; 
                this.prevX = this.x;
                this.prevY = this.y;
                this.speed = Math.random() * 2 + 1; 
                this.acceleration = 1.02; 
                this.size = Math.random() * 2 + 0.5;
                this.color = Math.random() > 0.5 ? `rgba(174, 238, 255, ${Math.random() * 0.5})` : `rgba(184, 170, 255, ${Math.random() * 0.5})`;
            }
            update() {
                this.prevX = this.x;
                this.prevY = this.y;
                let dx = centerX - this.x;
                let dy = centerY - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let angle = Math.atan2(dy, dx);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
                this.speed *= this.acceleration;
                if (distance < 50) this.resetAtEdge();
            }
            resetAtEdge() {
                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? 0 : canvas.width;
                    this.y = Math.random() * canvas.height;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() < 0.5 ? 0 : canvas.height;
                }
                this.prevX = this.x;
                this.prevY = this.y;
                this.speed = Math.random() * 2 + 1;
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.prevX, this.prevY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round'; 
                ctx.stroke();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = 150; 
            for (let i = 0; i < numberOfParticles; i++) { particlesArray.push(new WarpStreak()); }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(particle => { particle.update(); particle.draw(); });
        }

        init();
        animate();

        const stormOverlay = document.getElementById('storm-overlay');
        function triggerLightning() {
            const intensity = (Math.random() * 0.3) + 0.1;
            const isCyan = Math.random() > 0.5;
            stormOverlay.style.backgroundColor = isCyan ? 'var(--rune-cyan)' : 'var(--arcane-glow)';
            stormOverlay.style.opacity = intensity;
            setTimeout(() => { stormOverlay.style.opacity = 0; }, Math.random() * 100 + 50);
            if(Math.random() > 0.7) {
                setTimeout(() => {
                    stormOverlay.style.opacity = intensity * 0.5;
                    setTimeout(() => { stormOverlay.style.opacity = 0; }, 50);
                }, 150);
            }
            let nextFlash = Math.random() * 5000 + 2000;
            setTimeout(triggerLightning, nextFlash);
        }
        triggerLightning();
    </script>
</body>
</html>

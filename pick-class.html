<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Path</title>
    <link rel="stylesheet" href="pick-class.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <div id="pick-class-container">
        <div id="pick-class-background"></div>
        
        <div id="pick-class-content">
            <div id="class-narrative">
                <p>Your initiation is complete. The path to your first class awaits.</p>
                <p class="blood-reveal">Your blood has revealed your affinity</p>
                <p class="choose-any">Choose any class that calls to you, though the ritual suggests your natural inclinations. Click to learn more.</p>
            </div>

            <div id="class-cards">
                <!-- Cards will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Class Detail Popup -->
    <div id="class-popup" class="popup-hidden">
        <div class="popup-content">
            <h3 id="popup-class-name"></h3>
            <p id="popup-class-desc"></p>
            <div class="popup-buttons">
                <button id="popup-back">Back</button>
                <button id="popup-confirm">Confirm Path</button>
            </div>
        </div>
    </div>

    <script src="pick-class.js"></script>
    <script src="scene-manager.js"></script>
    <script src="save-manager.js"></script>
    
    
</body>
</html>

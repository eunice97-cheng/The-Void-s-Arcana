<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void's Arcana</title>
    <link rel="stylesheet" href="landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div id="main-cover">
        <div id="cover-background"></div>
        <div class="stars" id="stars-container"></div>
        
        <div id="title-container">
            <h1 id="game-title"></h1>
            <div class="title-glow"></div>
            <p id="subtitle">A Tale from Ashen Hearth</p>
        </div>
        
        <div id="button-container">
            <button class="landing-btn" id="register-btn" disabled>
                <span>Register</span>
                <div class="btn-tooltip">Registration temporarily unavailable</div>
            </button>
            
            <button class="landing-btn" id="login-btn" disabled>
                <span>Login</span>
                <div class="btn-tooltip">Login temporarily unavailable</div>
            </button>
            
            <button class="landing-btn" id="guest-btn">
                <span>Play as Guest</span>
            </button>
        </div>
        
        <div id="footer-note">
            <p>Backend features coming soon. Currently playing as guest is recommended.</p>
        </div>
    </div>

    <script src="landing.js"></script>
</body>
</html>
